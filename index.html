<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제주교육마루 — 한국교육학회 제주지회 뉴스레터</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f8f9fa;
      color: #212529;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: linear-gradient(160deg, #1a5c35 0%, #2d6a4f 55%, #40916c 100%);
      color: white;
      text-align: center;
      padding: 3rem 1.5rem;
    }
    .header img {
      max-width: 400px;
      width: 80%;
      margin-bottom: 1rem;
    }
    .header h1 {
      font-size: 1.1rem;
      font-weight: 400;
      opacity: 0.8;
      margin-bottom: 0.3rem;
    }
    .header p {
      font-size: 0.85rem;
      opacity: 0.6;
    }
    .content {
      max-width: 700px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
      flex: 1;
    }
    .content h2 {
      font-size: 1.2rem;
      color: #1a5c35;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #d8f3dc;
    }
    .issue-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s, transform 0.2s;
      border-left: 4px solid #2d7d46;
    }
    .issue-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }
    .issue-info h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a5c35;
      margin-bottom: 0.3rem;
    }
    .issue-info p {
      font-size: 0.85rem;
      color: #888;
    }
    .issue-arrow {
      color: #52b788;
      font-size: 1.2rem;
    }
    .footer {
      background: #1a5c35;
      color: rgba(255,255,255,0.7);
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
    }
    .footer a { color: rgba(255,255,255,0.9); text-decoration: none; }
    @media (max-width: 640px) {
      .header { padding: 2rem 1rem; }
      .header img { max-width: 280px; }
      .content { padding: 1.5rem 1rem; }
      .issue-card { padding: 1.2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="2025/images/calligraphy-white.png" alt="제주교육마루">
    <h1>한국교육학회 제주지회 뉴스레터</h1>
    <p>Since 1993</p>
  </div>

  <div class="content">
    <h2>발간 목록</h2>
    <a class="issue-card" href="2025/">
      <div class="issue-info">
        <h3>재창간호</h3>
        <p>2025년 10월 15일 발행</p>
      </div>
      <span class="issue-arrow">&rarr;</span>
    </a>
    <!-- 다음 호 추가 시 여기에 issue-card 추가 -->
  </div>

  <div class="footer">
    <p>&copy; 2025 한국교육학회 제주지회 &middot; <a href="https://cafe.naver.com/kerajeju">카페 바로가기</a></p>
  </div>
</body>
</html>
